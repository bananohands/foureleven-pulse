name: Update pulse data

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate pulse data
        run: node generate-pulse-data.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "foureleven-bot"
          git config user.email "foureleven-bot@users.noreply.github.com"
          git add pulse-data.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "pulse: update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
